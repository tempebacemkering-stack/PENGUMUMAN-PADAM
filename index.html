<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Pengumuman Pemadaman PLN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }
    header {
      background: #003f7f;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #ffd700;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
    }
    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 700;
      color: #003f7f;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8ecf0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="date"], input[type="time"], select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #d0d7de;
      border-radius: 8px;
      font-size: 14px;
      color: #222;
      background: #fafafa;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #003f7f;
      background: white;
    }
    .time-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
    }
    .time-row span {
      text-align: center;
      font-weight: 600;
      color: #666;
      font-size: 13px;
    }
    .penyulang-group {
      margin-bottom: 16px;
      border: 1.5px solid #e0e6ee;
      border-radius: 8px;
      overflow: hidden;
    }
    .penyulang-header {
      background: #003f7f;
      color: white;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .penyulang-header:hover { background: #00529f; }
    .penyulang-body {
      padding: 8px;
      background: #f8fafc;
    }
    .ruas-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ruas-item:hover { background: #e8f0fb; }
    .ruas-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: #003f7f;
    }
    .ruas-label {
      font-size: 12px;
      line-height: 1.4;
    }
    .ruas-name {
      font-weight: 600;
      color: #003f7f;
      display: block;
    }
    .ruas-alamat {
      color: #666;
      font-size: 11px;
      margin-top: 2px;
    }
    .select-all-btn {
      background: none;
      border: none;
      color: #ffd700;
      font-size: 11px;
      cursor: pointer;
      font-weight: 600;
      padding: 0;
    }
    .select-all-btn:hover { text-decoration: underline; }
    /* Preview */
    .preview-area {
      background: #fffef5;
      border: 1.5px solid #e0d8a8;
      border-radius: 8px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 300px;
      color: #222;
    }
    .preview-placeholder {
      color: #aaa;
      font-style: italic;
      font-family: inherit;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    button.action-btn {
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }
    button.action-btn:active { transform: scale(0.97); }
    .btn-copy {
      background: #003f7f;
      color: white;
    }
    .btn-copy:hover { background: #00529f; }
    .btn-reset {
      background: #e8ecf0;
      color: #444;
    }
    .btn-reset:hover { background: #d0d7de; }
    .btn-wa {
      background: #25d366;
      color: white;
    }
    .btn-wa:hover { background: #1ebe5a; }
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #222;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
    .selected-count {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
    .collapse-icon { font-size: 11px; }
  </style>
</head>

<header>
  <div class="logo">PLN</div>
  <h1>Generator Pemberitahuan Pemadaman<br>UP3 Majalaya</h1>
</header>

<div class="container">
  <!-- FORM -->
  <div class="card">
    <h2>📋 Input Data</h2>

    <div class="form-group">
      <label>Hari / Tanggal</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <select id="inp-hari">
          <option value="">-- Pilih Hari --</option>
          <option>Senin</option>
          <option>Selasa</option>
          <option>Rabu</option>
          <option>Kamis</option>
          <option>Jumat</option>
          <option>Sabtu</option>
          <option>Minggu</option>
        </select>
        <input type="date" id="inp-tanggal">
      </div>
    </div>

    <div class="form-group">
      <label>Waktu</label>
      <div class="time-row">
        <input type="time" id="inp-jam-mulai">
        <span>s.d.</span>
        <input type="time" id="inp-jam-selesai">
      </div>
    </div>

    <div class="form-group">
      <label>Wilayah Terdampak</label>
      <div id="wilayah-container"></div>
      <div class="selected-count" id="selected-count">0 ruas dipilih</div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="card">
    <h2>📄 Preview Pengumuman</h2>
    <div class="preview-area" id="preview">
      <span class="preview-placeholder">Preview pengumuman akan muncul di sini...</span>
    </div>
    <div class="btn-row">

  </div>
</div>

// ===================== BUILD FORM =====================
function buildWilayahForm() {
  const container = document.getElementById('wilayah-container');
  container.innerHTML = '';

  masterData.forEach((group, gi) => {
    const div = document.createElement('div');
    div.className = 'penyulang-group';

    const header = document.createElement('div');
    header.className = 'penyulang-header';
    header.innerHTML = `
      <span>Penyulang ${group.penyulang}</span>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="select-all-btn" onclick="selectAll(${gi}, event)">Pilih Semua</button>
        <span class="collapse-icon">▼</span>
      </div>
    `;
    header.addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON') return;
      body.style.display = body.style.display === 'none' ? 'block' : 'none';
      header.querySelector('.collapse-icon').textContent = body.style.display === 'none' ? '▶' : '▼';
    });

    const body = document.createElement('div');
    body.className = 'penyulang-body';

    group.ruas.forEach((ruas, ri) => {
      const item = document.createElement('label');
      item.className = 'ruas-item';
      item.innerHTML = `
        <input type="checkbox" id="cb-${gi}-${ri}" data-gi="${gi}" data-ri="${ri}" onchange="updatePreview()">
        <div class="ruas-label">
          <span class="ruas-name">${ruas.nama}</span>
          <span class="ruas-alamat">${ruas.alamat.substring(0, 80)}${ruas.alamat.length > 80 ? '...' : ''}</span>
        </div>
      `;
      body.appendChild(item);
    });

    div.appendChild(header);
    div.appendChild(body);
    container.appendChild(div);
  });
}

function selectAll(gi, e) {
  e.stopPropagation();
  const checkboxes = document.querySelectorAll(`[data-gi="${gi}"]`);
  const allChecked = Array.from(checkboxes).every(cb => cb.checked);
  checkboxes.forEach(cb => cb.checked = !allChecked);
  updatePreview();
}

// ===================== FORMAT DATE =====================
function formatTanggal(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function formatTime(timeStr) {
  if (!timeStr) return '';
  return timeStr.replace(':', '.') + ' WIB';
}

// ===================== UPDATE PREVIEW =====================
function updatePreview() {
  const hari = document.getElementById('inp-hari').value;
  const tanggal = document.getElementById('inp-tanggal').value;
  const jamMulai = document.getElementById('inp-jam-mulai').value;
  const jamSelesai = document.getElementById('inp-jam-selesai').value;

  // Collect selected areas
  const checked = document.querySelectorAll('input[type="checkbox"]:checked');
  const selectedCount = checked.length;
  document.getElementById('selected-count').textContent = `${selectedCount} ruas dipilih`;

  let wilayahList = [];
  checked.forEach(cb => {
    const gi = parseInt(cb.dataset.gi);
    const ri = parseInt(cb.dataset.ri);
    const ruas = masterData[gi].ruas[ri];
    wilayahList.push(`${masterData[gi].penyulang} - ${ruas.nama}:\n${ruas.alamat}`);
  });

  const hariTanggal = [hari, formatTanggal(tanggal)].filter(Boolean).join(', ');
  const waktu = [formatTime(jamMulai), formatTime(jamSelesai)].filter(Boolean).join(' s.d. ');

  if (!hariTanggal && !waktu && selectedCount === 0) {
    document.getElementById('preview').innerHTML = '<span class="preview-placeholder">Preview pengumuman akan muncul di sini...</span>';
    return;
  }

  const wilayahText = wilayahList.length > 0
    ? wilayahList.join('\n\n')
    : '[Belum dipilih]';

  const text =
`*PENGUMUMAN*

Sehubungan dengan adanya kendala teknis operasional pada pembangkit yang menyebabkan penurunan kapasitas suplai listrik, PLN melakukan manajemen beban secara terbatas di beberapa lokasi pada:

*Hari/Tanggal :* ${hariTanggal || '[Belum diisi]'}
*Waktu :* ${waktu || '[Belum diisi]'}
*Wilayah :*
${wilayahText}

Langkah ini dilakukan untuk menjaga keandalan dan stabilitas sistem kelistrikan.

PLN terus mengupayakan percepatan pemulihan kondisi operasi pembangkit dan menyampaikan permohonan maaf atas ketidaknyamanan yang terjadi.

PLN UP3 MAJALAYA`;

  document.getElementById('preview').textContent = text;
}

// ===================== ACTIONS =====================
function getPreviewText() {
  const el = document.getElementById('preview');
  return el.textContent || el.innerText;
}

function copyText() {
  const text = getPreviewText();
  if (!text || text.includes('Preview pengumuman')) {
    showToast('⚠️ Isi form terlebih dahulu');
    return;
  }
  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ Teks berhasil disalin!');
  });
}

function copyWA() {
  const text = getPreviewText();
  if (!text || text.includes('Preview pengumuman')) {
    showToast('⚠️ Isi form terlebih dahulu');
    return;
  }
  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ Format WhatsApp disalin!');
  });
}

function resetForm() {
  document.getElementById('inp-hari').value = '';
  document.getElementById('inp-tanggal').value = '';
  document.getElementById('inp-jam-mulai').value = '';
  document.getElementById('inp-jam-selesai').value = '';
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
  document.getElementById('selected-count').textContent = '0 ruas dipilih';
  document.getElementById('preview').innerHTML = '<span class="preview-placeholder">Preview pengumuman akan muncul di sini...</span>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===================== EVENT LISTENERS =====================
['inp-hari','inp-tanggal','inp-jam-mulai','inp-jam-selesai'].forEach(id => {
  document.getElementById(id).addEventListener('change', updatePreview);
  document.getElementById(id).addEventListener('input', updatePreview);
});

// ===================== INIT =====================
buildWilayahForm();
</script>
